name: run

on: [push, pull_request]

jobs:
  tests:
    runs-on: ubuntu-latest
    container: ${{ matrix.container }}
    strategy:
      matrix:
        container:
          - python:3.6
          - python:3.7
          - python:3.8
          - python:3.9
          - python:3.10
          - python:3.11
          - python:3.12
          - python:3.13
          - python:3.14
          - pypy:3.8
          - pypy:3.9
          - pypy:3.10
          - pypy:3.11
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6
      - run: |
          python3 -m unittest
